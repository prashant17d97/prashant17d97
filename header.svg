<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Prashant Singh - Engineering Manager">
  <defs>
    <!-- Animated sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0b2e">
        <animate attributeName="stop-color" values="#1a0b2e;#241046;#1a0b2e" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d0518">
        <animate attributeName="stop-color" values="#0d0518;#160a28;#0d0518" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7F52FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4321a0" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F75C7E" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#b3325a" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fe428e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7F52FF" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Glow for the title -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- A single reusable star -->
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#sky)"/>

  <!-- Twinkling stars -->
  <g fill="url(#star)">
    <circle cx="120" cy="60" r="2.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="40" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="70" r="2.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="35" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="65" r="2.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="45" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="95" r="1.4"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.6s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="90" r="1.5"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.2s" begin="1.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Rising particles (slow background depth) -->
  <g fill="#9f7aea">
    <circle cx="160" cy="320" r="2">
      <animate attributeName="cy" values="320;-10" dur="9s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="9s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="320" r="2.6">
      <animate attributeName="cy" values="320;-10" dur="11s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="11s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="320" r="2">
      <animate attributeName="cy" values="320;-10" dur="8s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="320" r="2.4">
      <animate attributeName="cy" values="320;-10" dur="10s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="10s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== PARALLAX LAYER 3 (deepest, slowest) ===== -->
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-600,0" dur="28s" repeatCount="indefinite"/>
    <path fill="url(#wave3)" d="M0,230 C150,200 300,260 450,235 C600,210 750,250 900,232 C1050,214 1200,250 1350,232 C1500,214 1650,255 1800,235 L1800,320 L0,320 Z"/>
  </g>

  <!-- ===== PARALLAX LAYER 2 (mid) ===== -->
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-600,0" dur="18s" repeatCount="indefinite"/>
    <path fill="url(#wave2)" d="M0,260 C150,235 300,285 450,262 C600,239 750,282 900,260 C1050,238 1200,282 1350,260 C1500,238 1650,285 1800,262 L1800,320 L0,320 Z"/>
  </g>

  <!-- ===== PARALLAX LAYER 1 (front, fastest) ===== -->
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-600,0" dur="12s" repeatCount="indefinite"/>
    <path fill="url(#wave1)" d="M0,288 C150,270 300,305 450,290 C600,275 750,306 900,288 C1050,270 1200,306 1350,288 C1500,270 1650,305 1800,290 L1800,320 L0,320 Z"/>
  </g>

  <!-- Title -->
  <g filter="url(#glow)">
    <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="2">
      Prashant Singh
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="600" y="190" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="19" font-weight="500" fill="#f75c7e" letter-spacing="3">
    Engineering Manager &#183; Polyglot Builder &#183; KMP Enthusiast
  </text>

  <!-- Animated underline accent -->
  <rect x="450" y="206" width="300" height="3" rx="1.5" fill="#7F52FF">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="200;320;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x" values="500;440;500" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
